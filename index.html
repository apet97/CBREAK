<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.clockify.me https://reports.api.clockify.me;">
  <title>Break Compliance</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1>Break Compliance</h1>
      <div class="header-controls">
        <div class="control-group">
          <label for="jurisdiction-select">Jurisdiction</label>
          <select id="jurisdiction-select">
            <option value="arbzg">German ArbZG &sect;4</option>
            <option value="california">California</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="control-group">
          <label for="date-preset-select">Date Range</label>
          <select id="date-preset-select">
            <option value="today">Today</option>
            <option value="this_week" selected>This Week</option>
            <option value="last_week">Last Week</option>
            <option value="last_2_weeks">Last 2 Weeks</option>
            <option value="last_month">Last Month</option>
            <option value="this_year">This Year</option>
            <option value="custom_range">Custom Range</option>
          </select>
        </div>
        <div id="custom-range-inputs" class="control-group custom-range-group" style="display: none;">
          <div class="date-range-row">
            <div class="date-input-group">
              <label for="custom-start-date">From</label>
              <input type="date" id="custom-start-date">
            </div>
            <div class="date-input-group">
              <label for="custom-end-date">To</label>
              <input type="date" id="custom-end-date">
            </div>
          </div>
        </div>
        <button id="generate-btn" class="btn-primary">Check Compliance</button>
        <button id="settings-gear-btn" class="btn-icon" title="Settings" aria-label="Settings" aria-expanded="false" aria-controls="settings-panel">&#9881;</button>
      </div>
    </header>

    <!-- Settings panel -->
    <section id="settings-panel" class="settings-panel" style="display: none;">
      <div class="settings-header">
        <h3>Custom Rules</h3>
        <button id="settings-close-btn" class="btn-close" aria-label="Close settings">&times;</button>
      </div>
      <div class="settings-body">
        <p class="settings-description">Define break requirements by work duration threshold.</p>
        <div id="custom-rules-list" class="custom-rules-list"></div>
        <button id="add-rule-btn" class="btn-secondary">+ Add Rule</button>
      </div>
    </section>

    <!-- View toggle -->
    <div class="view-toggle">
      <label class="toggle-option">
        <input type="radio" name="view-toggle" value="pivot" checked>
        <span>Pivot Table</span>
      </label>
      <label class="toggle-option">
        <input type="radio" name="view-toggle" value="checklist">
        <span>Checklist</span>
      </label>
    </div>

    <!-- Error banner -->
    <div id="error-banner" class="error-banner" style="display: none;"></div>

    <!-- Loading -->
    <div id="loading" class="loading" style="display: none;">
      <div class="loading-spinner"></div>
      <span>Checking compliance...</span>
    </div>

    <!-- Results -->
    <div id="results-container" class="results-container"></div>
  </div>

  <script type="module" src="js/main.js?v=1"></script>
</body>
</html>
